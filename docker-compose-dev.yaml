services:
  nginx:
    container_name: ${DOCKER_CONTAINER_PREFIX}-nginx
    image: amd64/nginx:stable-alpine
    platform: linux/amd64
    ports:
      - ${NGINX_PORT}:80
    volumes:
      - ${API_PATH}:${API_WORKDIR}
      - ${NGINX_WWW_CONFIG}:/etc/nginx/conf.d/default.conf
      - ${NGINX_CONFIG}:/etc/nginx/nginx.conf
    depends_on:
      - api
    networks:
      - www_app

  api:
    container_name: ${DOCKER_CONTAINER_PREFIX}-api
    build:
      context: ./
      dockerfile: ${API_DOCKER_FILE}
      args:
        workdir: ${API_WORKDIR}
    restart: unless-stopped
    expose:
      - 9000
    volumes:
      - ${API_PATH}:${API_WORKDIR}
      - ${API_PHP_INI}:/usr/local/etc/php/conf.d/php.ini
      - ${API_WWW_CONFIG}:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - postgres
    networks:
      - www_app

  postgres:
    container_name: ${DOCKER_CONTAINER_PREFIX}-postgres
    image: postgres:${POSTGRES_VERSION}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DBNAME}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ${POSTGRES_VOLUMES}:/var/lib/postgresql/data
    networks:
      - www_app

  redis:
    container_name: ${DOCKER_CONTAINER_PREFIX}-redis
    image: redis:${REDIS_VERSION}
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:6380
    volumes:
      - ${REDIS_CONFIG}:/usr/local/etc/redis/redis.conf
      - ${REDIS_VOLUMES}:/data
    command:
      - /usr/local/bin/redis-server
      - /usr/local/etc/redis/redis.conf
      - "--requirepass ${REDIS_PASSWORD}"
    networks:
      - www_app

  rabbitmq:
    container_name: ${DOCKER_CONTAINER_PREFIX}-rabbitmq
    image: rabbitmq:${RABBITMQ_VERSION}
    restart: unless-stopped
    platform: linux/amd64
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - ${RABBITMQ_API_PORT}:5672
      - ${RABBITMQ_WEB_PORT}:15672
    volumes:
      - ${RABBITMQ_VOLUMES}:/var/lib/rabbitmq
    networks:
      - www_app

  huggingface-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:${HUGGINGFACE_EMBEDDINGS_VERSION}
    container_name: ${DOCKER_CONTAINER_PREFIX}-huggingface-embeddings
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "${HUGGINGFACE_EMBEDDINGS_PORT}:80"
    environment:
      MODEL_ID: ${HUGGINGFACE_EMBEDDINGS_MODEL_ID}
    command:
      - "--model-id"
      - "${HUGGINGFACE_EMBEDDINGS_MODEL_ID}"
    volumes:
      - ${HUGGINGFACE_EMBEDDINGS_VOLUMES}:/data
    networks:
      - www_app

  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: ${DOCKER_CONTAINER_PREFIX}-minio
    restart: unless-stopped
    platform: linux/amd64
    hostname: ${MINIO_HOST}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - ${MINIO_API_PORT}:9000
      - ${MINIO_CONSOLE_PORT}:9001
    command: server /data --console-address ":9001"
    volumes:
      - ${MINIO_VOLUMES}:/data
    networks:
      - www_app

  aria2:
    image: p3terx/aria2-pro:${ARIA2_VERSION}
    container_name: ${DOCKER_CONTAINER_PREFIX}-aria2
    hostname: ${ARIA2_HOST}
    restart: unless-stopped
    platform: linux/amd64
    environment:
      RPC_SECRET: ${ARIA2_RPC_SECRET}
      RPC_PORT: ${ARIA2_RPC_PORT}
    ports:
      - ${ARIA2_RPC_PORT}:6880
    volumes:
      - ${ARIA2_DOWNLOADS_VOLUMES}:/downloads
    networks:
      - www_app

networks:
  www_app:
    external: true