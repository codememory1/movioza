imports:
    - { resource: './services/attribute.yaml' }
    - { resource: './services/serializer.yaml' }
    - { resource: './services/factory.yaml' }
    - { resource: './services/repository.yaml' }
    - { resource: './services/api.yaml' }

parameters: []

services:
    _defaults:
        autowire: true
        autoconfigure: true

    Movioza\Controller\:
        resource: '%kernel.project_dir%/src/Controller/**/*Controller.php'
        tags:
            - { name: controller.service_arguments }

    Movioza\DataFixtures\:
        resource: '%kernel.project_dir%/src/DataFixtures/*Fixtures.php'

    Movioza\EventListener\:
        resource: '%kernel.project_dir%/src/EventListener/*'

    app.redis.client:
        class: Predis\Client
        arguments:
            - {
                scheme: '%env(REDIS_SCHEME)%',
                host: '%env(REDIS_HOST)%',
                port: '%env(REDIS_PORT)%',
                password: '%env(REDIS_PASSWORD)%',
                database: '%env(REDIS_DATABASE)%',
                read_write_timeout: -1
            }

    Predis\ClientInterface: '@app.redis.client'

    # Slug generator
    movioza.slug_generator.cocur:
        class: Movioza\Service\Slug\CocurSlugGenerator

    Movioza\Service\Slug\SlugGeneratorInterface: '@movioza.slug_generator.cocur'
