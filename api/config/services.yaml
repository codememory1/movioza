parameters: []

services:
    _defaults:
        autowire: true
        autoconfigure: true

    Movioza\Controller\:
        resource: '../src/Controller/**/*Controller.php'
        tags:
            - { name: controller.service_arguments }

    Movioza\Attribute\ControllerArgument\:
        resource: '../src/Attribute/ControllerArgument/*Handler.php'
        tags:
            - { name: movioza.controller.argument_attribute_handler }

    Movioza\Resolver\AttributeValueResolver:
        tags:
            - { name: controller.argument_value_resolver }

    movioza.attribute.controller_argument.handler_registry:
        class: Movioza\Attribute\ControllerArgument\HandlerRegistry

    Movioza\Attribute\ControllerArgument\HandlerRegistryInterface: '@movioza.attribute.controller_argument.handler_registry'
